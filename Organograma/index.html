<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organograma — JMP Finance</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="app-header">
  <div class="header-left">
    <span class="brand-badge">ORG</span>
    <div class="header-titles">
      <span class="header-main-title">Organograma</span>
      <span class="header-subtitle">JMP Finance</span>
    </div>
  </div>

  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="organograma">🏢 Organograma</button>
    <button class="tab-btn" data-tab="pessoas">👤 Pessoas</button>
  </nav>

  <div class="header-right">
    <a href="/index.html" style="text-decoration:none;padding:4px 12px;background:rgba(15,32,68,.8);color:#fff;border:1.5px solid #2563eb;border-radius:6px;font-size:.78rem;font-weight:600;white-space:nowrap;">← Menu</a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar nome ou cargo…" />
      <button class="search-clear" id="search-clear" style="display:none;">✕</button>
    </div>
    <button class="btn btn-outline btn-sm" id="btn-export-png">⬇ PNG</button>
    <button class="btn btn-outline btn-sm" id="btn-export-pdf">⬇ PDF</button>
  </div>
</header>

<!-- ===================== MAIN ===================== -->
<main class="app-main">

  <!-- ========= TAB: ORGANOGRAMA ========= -->
  <section class="tab-panel active" id="tab-organograma">

    <!-- Toolbar -->
    <div class="org-toolbar">
      <button class="btn btn-primary btn-sm" id="btn-add-pessoa-org">+ Nova Pessoa</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-ghost btn-sm" id="btn-expand-all">⊞ Expandir tudo</button>
      <button class="btn btn-ghost btn-sm" id="btn-collapse-all">⊟ Colapsar tudo</button>
      <span class="org-count" id="org-count"></span>
    </div>

    <!-- Tree canvas -->
    <div class="org-wrapper" id="org-wrapper">
      <div class="org-container" id="org-container"></div>
    </div>

  </section>

  <!-- ========= TAB: PESSOAS ========= -->
  <section class="tab-panel" id="tab-pessoas">

    <div class="pessoas-toolbar">
      <button class="btn btn-primary btn-sm" id="btn-add-pessoa">+ Nova Pessoa</button>
    </div>

    <div class="table-card">
      <table class="pessoas-table">
        <thead>
          <tr>
            <th style="width:52px;"></th>
            <th>Nome</th>
            <th>Cargo</th>
            <th>Superior</th>
            <th style="width:80px;">Ações</th>
          </tr>
        </thead>
        <tbody id="pessoas-body"></tbody>
      </table>
      <div class="empty-state" id="pessoas-empty" style="display:none;">
        <span style="font-size:2.5rem;">👤</span>
        <p>Nenhuma pessoa cadastrada</p>
        <p style="font-size:.78rem;color:#94a3b8;">Clique em "+ Nova Pessoa" para começar</p>
      </div>
    </div>

  </section>

</main>

<!-- ===================== TOAST ===================== -->
<div id="toast" class="toast" style="display:none;"></div>

<!-- ===================== MODAL: PESSOA ===================== -->
<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Nova Pessoa</div>

    <!-- Photo upload area -->
    <div class="foto-area">
      <div class="foto-preview no-photo" id="form-foto-preview" data-foto="">?</div>
      <div class="foto-btns">
        <button class="btn btn-outline btn-sm" id="form-foto-btn">📷 Selecionar foto</button>
        <button class="btn btn-ghost btn-sm" id="form-foto-remove">Remover</button>
        <input type="file" id="form-foto-input" accept="image/*" style="display:none;" />
      </div>
    </div>

    <div class="form-group" style="margin-top:.75rem;">
      <label for="form-nome">Nome <span class="req">*</span></label>
      <input type="text" id="form-nome" class="text-input" placeholder="Ex: João Silva" />
    </div>

    <div class="form-group" style="margin-top:.75rem;">
      <label for="form-cargo">Cargo <span class="req">*</span></label>
      <input type="text" id="form-cargo" class="text-input" placeholder="Ex: Diretor Comercial" />
    </div>

    <div class="form-group" style="margin-top:.75rem;">
      <label for="form-parent">Superior (quem gerencia esta pessoa)</label>
      <select id="form-parent" class="select-input select-full"></select>
    </div>

    <div class="form-error" id="modal-error" style="display:none;margin-top:.5rem;"></div>

    <div class="modal-actions" style="margin-top:1.25rem;">
      <button class="btn btn-ghost btn-sm" id="modal-cancel">Cancelar</button>
      <button class="btn btn-primary btn-sm" id="modal-save">Salvar</button>
    </div>
  </div>
</div>

<!-- ===================== MODAL: CONFIRMAR ===================== -->
<div class="modal-overlay" id="confirm-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-title" id="confirm-title">Confirmar</div>
    <div class="modal-body" id="confirm-body"></div>
    <div class="modal-actions" style="margin-top:1.25rem;">
      <button class="btn btn-ghost btn-sm" id="confirm-cancel">Cancelar</button>
      <button class="btn btn-danger btn-sm" id="confirm-confirm">Excluir</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
