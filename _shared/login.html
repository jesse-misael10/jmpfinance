<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — JMP Finance</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 60% 40%, #1e3a6e 0%, #0f2044 50%, #060d1a 100%);
      position: relative;
      overflow: hidden;
    }

    /* Blobs decorativos */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,.12) 0%, transparent 70%);
      top: -150px; right: -100px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,.08) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      background: #2563eb;
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      border-radius: 16px;
      letter-spacing: .05em;
      margin-bottom: .75rem;
      box-shadow: 0 8px 32px rgba(37,99,235,.4);
    }

    .login-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    .login-sub {
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      margin-top: .25rem;
    }

    .login-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(20px);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      margin-bottom: 1rem;
    }

    .form-label {
      font-size: .78rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
    }

    .form-input {
      padding: .65rem .9rem;
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 8px;
      font-size: .9rem;
      color: #fff;
      background: rgba(255,255,255,.06);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .form-input::placeholder { color: rgba(255,255,255,.25); }
    .form-input:focus { border-color: rgba(255,255,255,.35); }

    .btn-login {
      width: 100%;
      padding: .72rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      margin-top: .25rem;
      box-shadow: 0 4px 16px rgba(37,99,235,.35);
    }
    .btn-login:hover { background: #1d4ed8; box-shadow: 0 6px 20px rgba(37,99,235,.5); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: rgba(220,38,38,.15);
      border: 1px solid rgba(220,38,38,.35);
      color: #fca5a5;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .82rem;
      margin-bottom: 1rem;
    }

    .forgot-link {
      text-align: center;
      margin-top: 1rem;
      font-size: .76rem;
    }

    .forgot-link a {
      color: rgba(255,255,255,.45);
      text-decoration: none;
      cursor: pointer;
      transition: color .15s;
    }
    .forgot-link a:hover { color: rgba(255,255,255,.75); }

    /* Reset password view */
    .reset-view { display: none; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .78rem;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      margin-bottom: 1rem;
      text-decoration: none;
      transition: color .15s;
    }
    .back-link:hover { color: #fff; }

    .success-msg {
      display: none;
      background: rgba(22,163,74,.15);
      border: 1px solid rgba(22,163,74,.35);
      color: #86efac;
      border-radius: 8px;
      padding: .6rem .9rem;
      font-size: .82rem;
      margin-bottom: 1rem;
    }

    .reset-desc {
      font-size: .82rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-badge">JMP</div>
    <div class="login-title">JMP Finance</div>
    <div class="login-sub">Painel de Gestão</div>
  </div>

  <!-- ── View: Login ── -->
  <div class="login-card" id="view-login">
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" id="login-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="login-senha" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-login">Entrar</button>
    <div class="forgot-link">
      <a id="link-forgot">Esqueci minha senha</a>
    </div>
  </div>

  <!-- ── View: Reset ── -->
  <div class="login-card reset-view" id="view-reset">
    <a class="back-link" id="link-back">← Voltar ao login</a>
    <div class="success-msg" id="reset-success"></div>
    <div class="error-msg" id="reset-error"></div>
    <p class="reset-desc">Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" id="reset-email" placeholder="seu@email.com" />
    </div>
    <button class="btn-login" id="btn-reset">Enviar link</button>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  const params   = new URLSearchParams(window.location.search);
  const returnTo = params.get('return') || null;

  db.auth.getSession().then(({ data: { session } }) => {
    if (session) goToApp();
  });

  function goToApp() {
    if (returnTo) {
      window.location.href = decodeURIComponent(returnTo);
    } else {
      window.location.href = '../index.html';
    }
  }

  // ── Login ─────────────────────────────────────────────
  const btnLogin   = document.getElementById('btn-login');
  const loginError = document.getElementById('login-error');

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;

    if (!email || !senha) {
      showError(loginError, 'Preencha e-mail e senha.');
      return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Entrando…';
    loginError.style.display = 'none';

    const { error } = await db.auth.signInWithPassword({ email, password: senha });

    if (error) {
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
      const msg = error.message.includes('Invalid') || error.message.includes('credentials')
        ? 'E-mail ou senha incorretos.'
        : error.message;
      showError(loginError, msg);
      return;
    }

    goToApp();
  }

  btnLogin.addEventListener('click', doLogin);
  document.getElementById('login-senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ── Reset password ────────────────────────────────────
  document.getElementById('link-forgot').addEventListener('click', () => {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-reset').style.display = 'block';
    document.getElementById('reset-email').value =
      document.getElementById('login-email').value;
  });

  document.getElementById('link-back').addEventListener('click', () => {
    document.getElementById('view-login').style.display = 'block';
    document.getElementById('view-reset').style.display = 'none';
  });

  document.getElementById('btn-reset').addEventListener('click', async () => {
    const email = document.getElementById('reset-email').value.trim();
    const errEl = document.getElementById('reset-error');
    const okEl  = document.getElementById('reset-success');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';

    if (!email) { showError(errEl, 'Digite seu e-mail.'); return; }

    const { error } = await db.auth.resetPasswordForEmail(email);
    if (error) { showError(errEl, error.message); return; }

    okEl.textContent = 'Link enviado! Verifique seu e-mail.';
    okEl.style.display = 'block';
  });

  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
